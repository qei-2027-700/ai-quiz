name: Deploy Production

on:
  push:
    tags:
      - "v*.*.*"

env:
  AWS_REGION: ap-northeast-1
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}

jobs:
  # ── Backend: ECR → ECS Fargate ─────────────────────────────
  deploy-backend:
    name: Deploy Backend (ECS Production)
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_PRODUCTION }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/backend:${{ github.ref_name }}
            ${{ env.ECR_REGISTRY }}/backend:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster lifecycle-production \
            --service backend \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Wait for stable
        run: |
          aws ecs wait services-stable \
            --cluster lifecycle-production \
            --services backend \
            --region ${{ env.AWS_REGION }}

  # ── Frontend: Vercel ───────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend (Vercel Production)
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Deploy to Vercel (production)
        working-directory: frontend
        run: |
          pnpm install -g vercel
          vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
          vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
          vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # ── GitHub Release ─────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [deploy-backend, deploy-frontend]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
